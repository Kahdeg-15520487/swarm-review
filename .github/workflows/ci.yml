name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx tsc --noEmit

  review:
    name: Swarm Review
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install swarm-review
        run: npm install -g swarm-review

      - name: Run review
        id: review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set +e
          swarm-review \
            --diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} \
            --format markdown \
            --model deepseek-v4-flash \
            --provider deepseek \
            --no-color \
            > review-output.md 2>review-stderr.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e
          cat review-stderr.txt

      - name: Post review comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s review-output.md ]; then
            # Add verdict header based on exit code
            EXIT_CODE="${{ steps.review.outputs.exit_code }}"
            if [ "$EXIT_CODE" = "0" ]; then
              HEADER="## ✅ Swarm Review — Approved"
            elif [ "$EXIT_CODE" = "1" ]; then
              HEADER="## ⚠️ Swarm Review — Minor Issues"
            elif [ "$EXIT_CODE" = "2" ]; then
              HEADER="## 🚫 Swarm Review — Significant Concerns"
            else
              HEADER="## ⚠️ Swarm Review — Error"
            fi

            {
              echo "$HEADER"
              echo ""
              cat review-output.md
              echo ""
              echo "---"
              echo "<sub>Triggered by commit \`${{ github.sha }}\`</sub>"
            } | gh pr comment ${{ github.event.pull_request.number }} --body-file -
          fi

      - name: Check verdict
        if: steps.review.outputs.exit_code == '2'
        run: |
          echo "::error::Swarm Review found significant concerns. See the review comment for details."
          exit 1
